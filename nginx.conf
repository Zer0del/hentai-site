# Example Nginx config for production
# Place in /etc/nginx/sites-available/hentach or similar
# This removes upload limits for adding manga with many pages (ZIP or multiple images)

server {
    listen 80;
    server_name hentach.ru www.hentach.ru;

    # Increase this to allow large uploads (ZIP with 100+ pages)
    # This fixes 413 Request Entity Too Large when adding manga with many pages
    client_max_body_size 2G;
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For large uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Serve uploaded manga files directly (fast, no python)
    location /uploads {
        alias /var/www/hentach/uploads;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets
    location /static {
        alias /var/www/hentach/static;
        expires 30d;
    }

    # SSL (use certbot)
    # listen 443 ssl;
    # ...
}
