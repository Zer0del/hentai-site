# Example Nginx config for production
# Place in /etc/nginx/sites-available/hentach or similar
# This removes upload limits for adding manga with many pages (ZIP or multiple images)

server {
    listen 80;
    server_name hentach.ru www.hentach.ru;

    # Increase this to allow large uploads (ZIP with 200-300+ pages)
    # Also set long timeouts below for slow uploads/processing of big archives
    client_max_body_size 2G;
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Compression (gzip) for HTML/CSS/JS - big win for page load
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Critical for large uploads over HTTP/2 + proxy
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_body_timeout 600s;
    }

    # Serve uploaded manga files directly (fast, no python)
    location /uploads {
        alias /var/www/hentach/uploads;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets
    location /static {
        alias /var/www/hentach/static;
        expires 30d;
    }

    # SSL (use certbot)
    # listen 443 ssl;
    # ...
}
