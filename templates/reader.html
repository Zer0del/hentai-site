{% extends "base.html" %}

{% block title %}Читалка — {{ manga.title }} • Hentach{% endblock %}

{% block head %}
<style>
    /* Remove global site navbar and footer in reader so the reader toolbar becomes the top bar */
    nav, footer {
        display: none !important;
    }

    .reader-bg { 
        background: #0a0a0a; 
        position: relative; 
        /* subtle vignette for depth */
        background-image: radial-gradient(circle at center, #111 0%, #050505 70%, #000 100%);
    }
    .reader-toolbar {
        background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0.6));
        backdrop-filter: blur(12px);
    }
    .reader-image-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: calc(100vh - 44px - 60px); /* compact toolbar for mobile + bottom */
        overflow: hidden;
        user-select: none;
        touch-action: pan-x pan-y;
    }

    .reader-focused .reader-image-container,
    .reader-image-container.zoomed {
        touch-action: none;
    }

    .reader-focused .reader-image-container {
        height: calc(100vh - 44px - 60px);
    }
    .reader-image-wrapper {
        position: relative;
        transition: transform 0.05s linear;
        cursor: grab;
        will-change: transform;
        backface-visibility: hidden;
    }
    .reader-image-wrapper:active { cursor: grabbing; }
    
    .reader-image {
        max-width: 100%;
        max-height: 100%;
        display: block;
        pointer-events: none;
        /* thin border + soft shadow to separate page from dark bg */
        border: 1px solid #222;
        box-shadow: 0 10px 30px -10px rgb(0 0 0 / 0.6), 0 0 0 1px rgba(255,255,255,0.035);
        image-rendering: auto;
        opacity: 0;
        transition: opacity 0.08s ease-out;
        will-change: opacity;
        border-radius: 2px;
    }
    .reader-image.loaded {
        opacity: 1;
    }

    /* Temporary absolute covers used during page turn to mask src-swap timing (double-buffering) */
    .page-swap-cover {
        position: absolute;
        pointer-events: none;
        z-index: 5;
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
    }

    .double-page {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
    }
    .double-page img {
        max-height: 100%;
        max-width: 49%;
        object-fit: contain;
    }

    .page-nav {
        position: absolute;
        top: 0; bottom: 0;
        width: 28%;
        z-index: 20;
        transition: background .1s;
        pointer-events: auto;
    }
    .page-nav.left { left: 0; }
    .page-nav.right { right: 0; }
    .page-nav:hover { background: linear-gradient(to right, rgba(255,255,255,0.015), transparent); }
    .page-nav.right:hover { background: linear-gradient(to left, rgba(255,255,255,0.015), transparent); }

    .reader-focused #reader-bottom {
        display: none !important;
    }

    /* Make bottom bar overlay the content so showing/hiding thumbnails doesn't cause layout shift/jumping of the page image */
    #reader-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        pointer-events: none;
        transition: opacity 0.22s ease;
        opacity: 1;
    }
    #reader-bottom.hidden {
        opacity: 0;
        pointer-events: none;
    }
    #reader-bottom .thumbnails-strip {
        pointer-events: auto;
    }

    /* Mobile: ensure toolbar always visible (same as PC), adjust heights */
    @media (hover: none) and (pointer: coarse) {
        .reader-image-container {
            height: calc(100vh - 56px - 60px) !important; /* toolbar + bottom */
        }
    }

    .thumbnails-strip {
        scrollbar-width: thin;
        scrollbar-color: #333 #111;
    }

    .thumbnails-strip::-webkit-scrollbar {
        height: 5px;
    }
    .thumbnails-strip::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
    }

    .thumbnail-item {
        width: 58px;
        height: 74px;
        flex-shrink: 0;
        border: 3px solid transparent;
        overflow: hidden;
        border-radius: 4px;
        cursor: pointer;
        transition: all .1s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .thumbnail-item.active {
        border-color: #e11d48;
        box-shadow: 0 0 0 1px #e11d48;
    }
    .thumbnail-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        image-rendering: auto;
    }

    /* Larger thumbnails on PC for better visibility in the strip */
    @media (min-width: 1024px) {
        .thumbnail-item {
            width: 80px;
            height: 102px;
        }
    }

    .reader-controls {
        font-size: 13px;
    }

    .fit-btn {
        padding: 6px 13px;
        font-size: 12px;
        border-radius: 6px;
        background: #1a1a1a;
        transition: all .1s;
    }
    .fit-btn.active {
        background: #e11d48;
        color: white;
    }

    .zoom-display {
        min-width: 52px;
        text-align: center;
    }

    /* Extra mobile polish for reader toolbar + scroll */
    @media (hover: none) and (pointer: coarse) {
        .reader-toolbar { font-size: 12px; height: 44px !important; }
        .reader-controls .font-mono { font-size: 11px; padding-left: 8px; padding-right: 8px; }
        #gear-btn { padding: 4px 8px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="reader-bg text-white h-screen flex flex-col overflow-hidden select-none">
    <!-- Top toolbar -->
    <div class="reader-toolbar px-3 sm:px-4 h-11 sm:h-[56px] flex items-center justify-between z-40 border-b border-white/10 shrink-0">
        <div class="flex items-center gap-x-2 sm:gap-x-4 min-w-0">
            <a href="/manga/{{ manga.id }}" onclick="if (history.length > 1) { event.preventDefault(); history.back(); } return false;" class="flex items-center text-white/70 hover:text-white px-2 sm:px-3 py-1 gap-x-1 sm:gap-x-2 rounded-lg hover:bg-white/10 text-sm">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="hidden sm:inline">Назад</span>
            </a>
            
            <!-- Title hidden on mobile to save space; author/original handled on detail -->
            <div class="hidden sm:flex items-center gap-x-2.5">
                <a href="/manga/{{ manga.id }}" class="font-semibold tracking-tight text-lg hover:text-[#e11d48] transition truncate max-w-[240px]">{{ manga.title }}</a>
                <div class="text-xs px-2 py-px bg-white/10 rounded text-white/70 hidden md:block">{{ manga.pages_count }} стр.</div>
            </div>
        </div>

        <!-- Mobile compact: back + page num + gear (settings) -->
        <div class="flex items-center gap-x-1 sm:gap-x-2 reader-controls flex-1 sm:flex-none justify-end">
            <!-- Page indicator (always prominent) -->
            <div class="font-mono text-xs sm:text-sm px-2 sm:px-4 py-0.5 sm:py-1 bg-white/5 rounded-full border border-white/10 tabular-nums">
                <span id="page-current">1</span> / <span id="page-total">{{ manga.pages_count }}</span>
            </div>

            <!-- Gear for all settings (mobile primary, PC also has) -->
            <button onclick="toggleReaderSettings()" id="gear-btn"
                    class="px-2 py-1 text-sm bg-white/5 hover:bg-white/10 rounded-xl flex items-center gap-1 border border-white/10"
                    title="Настройки читалки">
                <i class="fa-solid fa-cog"></i>
            </button>

            <!-- Desktop only full controls -->
            <div class="hidden md:flex items-center gap-x-1">
                <!-- Direction -->
                <button onclick="toggleDirection()" id="dir-btn"
                        class="px-3 py-1.5 text-xs bg-white/5 hover:bg-white/10 rounded-xl flex items-center gap-1.5 border border-white/10">
                    <i class="fa-solid fa-arrow-right"></i>
                    <span id="dir-label">LTR</span>
                </button>

                <!-- Modes -->
                <button onclick="toggleDoublePage()" id="double-btn"
                        class="px-3 py-1.5 text-xs bg-white/5 hover:bg-white/10 rounded-xl flex items-center gap-1.5 border border-white/10">
                    <i class="fa-solid fa-columns"></i>
                    <span id="double-label">1 стр.</span>
                </button>

                <!-- Scroll mode -->
                <button onclick="toggleScrollMode()" id="scroll-btn"
                        class="px-3 py-1.5 text-xs bg-white/5 hover:bg-white/10 rounded-xl flex items-center gap-1.5 border border-white/10">
                    <i class="fa-solid fa-bars-staggered"></i>
                    <span id="scroll-label">Скролл</span>
                </button>
                
                <!-- Fit -->
                <div class="flex border border-white/10 rounded-xl overflow-hidden text-xs">
                    <button onclick="setFitMode('width')" id="fit-width" class="fit-btn px-3 py-1.5">По ширине</button>
                    <button onclick="setFitMode('height')" id="fit-height" class="fit-btn px-3 py-1.5 active">По высоте</button>
                    <button onclick="setFitMode('original')" id="fit-original" class="fit-btn px-3 py-1.5">Оригинал</button>
                </div>

                <!-- Zoom -->
                <div class="flex items-center gap-1 bg-white/5 border border-white/10 rounded-xl pl-1 pr-3 text-xs">
                    <button onclick="zoomOut()" class="px-2 py-1 hover:bg-white/10 rounded-l-xl"><i class="fa-solid fa-minus"></i></button>
                    <div id="zoom-level" class="zoom-display font-mono tabular-nums">100%</div>
                    <button onclick="zoomIn()" class="px-2 py-1 hover:bg-white/10 rounded-r-xl"><i class="fa-solid fa-plus"></i></button>
                    <button onclick="resetZoom()" class="pl-2 text-[11px] opacity-70 hover:opacity-100">RESET</button>
                </div>
            </div>

            <button onclick="if (history.length > 1) { history.back(); } else { window.location.href='/manga/{{ manga.id }}'; }" 
                    class="px-2 py-1 hover:bg-white/10 rounded-xl text-sm flex items-center gap-x-1 border border-white/10">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Reader settings popup (for gear, especially mobile) -->
    <div id="reader-settings" class="hidden fixed z-[60] bg-[#111] border border-white/10 rounded-2xl p-3 text-sm shadow-xl" style="top: 48px; right: 8px; min-width: 180px;">
        <div class="flex flex-col gap-2">
            <button onclick="toggleDirection(); hideReaderSettings();" class="text-left px-3 py-1 hover:bg-white/10 rounded flex items-center gap-2"><i class="fa-solid fa-arrow-right w-4"></i> <span>Направление <span id="set-dir">LTR</span></span></button>
            <button onclick="toggleDoublePage(); hideReaderSettings();" class="text-left px-3 py-1 hover:bg-white/10 rounded flex items-center gap-2"><i class="fa-solid fa-columns w-4"></i> <span id="set-double">1 стр.</span></button>
            <button onclick="toggleScrollMode(); hideReaderSettings();" class="text-left px-3 py-1 hover:bg-white/10 rounded flex items-center gap-2"><i class="fa-solid fa-bars-staggered w-4"></i> <span id="set-scroll">Скролл</span></button>
            <div class="border-t border-white/10 my-1"></div>
            <div class="px-1 text-xs text-white/50">Подгонка</div>
            <div class="flex gap-1">
                <button onclick="setFitMode('width'); hideReaderSettings();" class="flex-1 py-1 text-xs bg-white/5 rounded">Ширина</button>
                <button onclick="setFitMode('height'); hideReaderSettings();" class="flex-1 py-1 text-xs bg-white/5 rounded">Высота</button>
                <button onclick="setFitMode('original'); hideReaderSettings();" class="flex-1 py-1 text-xs bg-white/5 rounded">Ориг</button>
            </div>
            <div class="flex gap-1 mt-1">
                <button onclick="zoomOut(); " class="flex-1 py-1 text-xs bg-white/5 rounded">-</button>
                <button onclick="resetZoom(); hideReaderSettings();" class="flex-1 py-1 text-xs bg-white/5 rounded">100%</button>
                <button onclick="zoomIn(); " class="flex-1 py-1 text-xs bg-white/5 rounded">+</button>
            </div>
        </div>
    </div>

    <!-- Main viewer -->
    <div id="viewer" class="reader-image-container flex-1 relative" style="background:#000;">
        <!-- Click zones (JS attached, disabled when zoomed) -->
        <div class="page-nav left"></div>
        <div class="page-nav right"></div>

        <!-- Image(s) container -->
        <div id="image-wrapper" class="reader-image-wrapper flex items-center justify-center" style="transform: scale(1) translate(0, 0);">
            <!-- JS injects images here -->
        </div>
    </div>

    <!-- Bottom bar: Progress + Thumbnails -->
    <div class="bg-[#0a0a0a] border-t border-white/10 shrink-0 z-40" id="reader-bottom">
        <!-- Progress -->
        <div class="h-0.5 bg-white/10 relative">
            <div id="progress-bar" class="h-full bg-[#e11d48] transition-all" style="width: 0%"></div>
        </div>

        <!-- Thumbnails strip temporarily disabled to reduce repeated image loads when navigating within one manga -->
        <!-- <div class="px-4 py-3 overflow-x-auto thumbnails-strip flex gap-2" id="thumbnails">
            <!-- Populated by JS -->
        </div> -->
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const MANGA_SLUG = "{{ manga.slug }}";
const MANGA_ID = {{ manga.id }};
const TOTAL_PAGES = {{ manga.pages_count }};
let pages = [];      // full size URLs (for main viewer)
let pagesThumb = [];   // thumb URLs for strip (falls back to full)
let currentPage = 1; // 1-based
let isDouble = false;
let direction = 'ltr'; // ltr or rtl
let fitMode = 'height';
let zoomLevel = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX = 0, dragStartY = 0, startPanX = 0, startPanY = 0;
let isFocused = false;

let pinchInitialDist = 0;
let pinchInitialZoom = 1;
let pinchCenterX = 0;
let pinchCenterY = 0;

let bottomVisible = false;
let isTouchDevice = false;
let scrollMode = false;
let scrollContainer = null;  // for vertical continuous mode

let hideBottomTimeout = null;
const BOTTOM_HIDE_DELAY = 500; // 0.5 секунды — полоска с страницами исчезает после бездействия мыши

let lastSingleTouchX = 0;
let lastSingleTouchY = 0;

async function loadMangaData() {
    const cacheKey = 'manga_data_' + (MANGA_ID || MANGA_SLUG);
    let data = JSON.parse(sessionStorage.getItem(cacheKey) || 'null');
    if (!data) {
        const res = await fetch(`/api/manga/${MANGA_ID || MANGA_SLUG}`);
        data = await res.json();
        data._cached_at = Date.now();
        sessionStorage.setItem(cacheKey, JSON.stringify(data));
    }
    pages = data.pages || [];                    // full size for main viewer
    pagesThumb = data.pages_thumb || data.pages; // prefer thumbs for the strip
    if (!pages.length) {
        alert("Нет страниц");
        window.location.href = `/manga/${MANGA_ID || MANGA_SLUG}`;
        return;
    }
    // preloading first images once per manga
    for(let i = 0; i < Math.min(5, pages.length); i++) {
        const img = new Image();
        img.src = pages[i];
    }
    // renderThumbnails(); // temporarily disabled to reduce repeated thumbnail loads

    // Support direct jump via ?page=N or /manga/id/N
    const params = new URLSearchParams(window.location.search);
    let start = parseInt(params.get('page')) || {{ manga.start_page }} || 1;
    const pathParts = window.location.pathname.split('/');
    const lastPart = pathParts[pathParts.length - 1];
    if (pathParts.length >= 3 && !isNaN(parseInt(lastPart))) {
        start = parseInt(lastPart);
    }
    // Preload large window for seamless (nhentai-like)
    const startIdx = start - 1;
    preloadPages(Math.max(0, startIdx - 3), startIdx + 12);
    goToPage(start, false);

    // ensure nice URL /manga/id/N 
    if (MANGA_ID && (window.location.pathname.includes('/read/') || window.location.search.includes('page='))) {
        history.replaceState({page: start}, '', `/manga/${MANGA_ID}/${start}`);
    }
}

function getPageUrl(index) { // 0-based
    return pages[index];
}

function renderThumbnails() {
    const container = document.getElementById('thumbnails');
    container.innerHTML = '';
    
    const thumbList = pagesThumb.length ? pagesThumb : pages;
    thumbList.forEach((url, idx) => {
        const div = document.createElement('div');
        div.className = `thumbnail-item ${idx + 1 === currentPage ? 'active' : ''}`;
        div.innerHTML = `<img src="${url}" loading="lazy" alt="стр ${idx+1}">`;
        div.onclick = () => goToPage(idx + 1);
        container.appendChild(div);
    });
}

function updateUI() {
    // Page number
    document.getElementById('page-current').innerText = currentPage;
    document.getElementById('page-total').innerText = TOTAL_PAGES;

    // Progress
    const progress = ((currentPage - 1) / (TOTAL_PAGES - 1)) * 100 || 0;
    document.getElementById('progress-bar').style.width = `${progress}%`;

    // Thumbnails highlight
    document.querySelectorAll('#thumbnails .thumbnail-item').forEach((el, i) => {
        el.classList.toggle('active', (i + 1) === currentPage);
        if ((i + 1) === currentPage) {
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    });

    // Labels
    document.getElementById('double-label').innerText = isDouble ? '2 стр.' : '1 стр.';
    document.getElementById('dir-label').innerText = direction.toUpperCase();
}

function renderCurrentImage() {
    const wrapper = document.getElementById('image-wrapper');
    wrapper.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
    
    const idx = currentPage - 1;
    let indices = [idx];
    
    if (isDouble) {
        wrapper.classList.add('double-page');
        let leftIdx = idx;
        let rightIdx = idx + 1;
        if (rightIdx >= pages.length) rightIdx = leftIdx;
        if (direction === 'rtl') {
            let tmp = leftIdx; leftIdx = rightIdx; rightIdx = tmp;
        }
        indices = [leftIdx, rightIdx];
    } else {
        wrapper.classList.remove('double-page');
    }

    // --- Core anti-flash logic (following the provided recommendations) ---
    // For normal page turns (same # of images): use live elements + absolute overlay covers
    //   (old picture stays visible via cover while we swap src underneath + wait for paint).
    //   This is true double-buffering without changing element count in flow.
    // For first render or when count changes (double/single toggle): append fresh imgs then prune.
    // Preloads + 'complete' check + no decoding=async + will-change + short opacity fade.
    const currentImgs = Array.from(wrapper.querySelectorAll('img.reader-image'));
    const needed = indices.length;
    const countStable = (currentImgs.length === needed && needed > 0);

    if (countStable && zoomLevel <= 1.05) {
        // Stable count + normal zoom (most paging): double-buffer with absolute covers.
        // Old picture remains fully visible on top via clone while we update src on the
        // underlying element and wait for it to paint. No black, no layout shift.
        const covers = [];
        currentImgs.forEach((img, slot) => {
            const url = getPageUrl(indices[slot]);

            const cover = img.cloneNode(true);
            cover.classList.add('page-swap-cover', 'loaded');
            cover.style.transition = 'opacity 0.08s ease-out';

            // Place exactly over the real img (use visual rect; safe at scale ~1)
            const imgRect = img.getBoundingClientRect();
            const wrapRect = wrapper.getBoundingClientRect();
            const left = imgRect.left - wrapRect.left;
            const top = imgRect.top - wrapRect.top;
            cover.style.left = left + 'px';
            cover.style.top = top + 'px';
            cover.style.width = imgRect.width + 'px';
            cover.style.height = imgRect.height + 'px';
            cover.style.maxWidth = 'none';
            cover.style.maxHeight = 'none';

            wrapper.appendChild(cover);
            covers.push(cover);

            if (img.src !== url) {
                const handleReady = () => {
                    const c = covers[slot];
                    if (c && c.parentNode) {
                        c.style.opacity = '0';
                        setTimeout(() => {
                            if (c && c.parentNode) c.parentNode.removeChild(c);
                        }, 90);
                    }
                    img.classList.add('loaded');
                };
                img.addEventListener('load', handleReady, { once: true });

                img.src = url;

                if (img.complete) {
                    const c = covers[slot];
                    if (c && c.parentNode) c.parentNode.removeChild(c);
                    img.classList.add('loaded');
                }
            } else {
                if (cover && cover.parentNode) cover.parentNode.removeChild(cover);
            }
        });
    } else if (countStable) {
        // Zoomed or edge case: simple in-place src update (with opacity masking)
        currentImgs.forEach((img, slot) => {
            const url = getPageUrl(indices[slot]);
            if (img.src !== url) {
                img.classList.remove('loaded');
                const h = () => { img.classList.add('loaded'); };
                img.addEventListener('load', h, { once: true });
                img.src = url;
                if (img.complete) {
                    const pt = img.style.transition;
                    img.style.transition = 'none';
                    img.classList.add('loaded');
                    void img.offsetWidth;
                    requestAnimationFrame(() => { img.style.transition = pt || ''; });
                }
            }
        });
    } else {
        // Count changed (double toggle) or first render: append fresh then remove old
        const oldImgs = currentImgs;
        const frag = document.createDocumentFragment();
        for (let i = 0; i < needed; i++) {
            const url = getPageUrl(indices[i]);
            const img = document.createElement('img');
            img.className = 'reader-image';
            img.loading = 'eager';
            img.fetchPriority = 'high';
            img.onerror = function() { this.src = 'https://picsum.photos/id/1011/600/800'; };

            img.classList.remove('loaded');
            const handleLoad = () => { img.classList.add('loaded'); };
            img.addEventListener('load', handleLoad, { once: true });

            img.src = url;
            if (img.complete) {
                const prevT = img.style.transition;
                img.style.transition = 'none';
                img.classList.add('loaded');
                void img.offsetWidth;
                requestAnimationFrame(() => { img.style.transition = prevT || ''; });
            }
            frag.appendChild(img);
        }
        wrapper.appendChild(frag);

        oldImgs.forEach(old => {
            if (old && old.parentNode) old.parentNode.removeChild(old);
        });
    }

    applyFit();
    updateUI();
}

function applyFit() {
    const wrapper = document.getElementById('image-wrapper');
    const imgs = wrapper.querySelectorAll('img.reader-image');
    
    imgs.forEach(img => {
        img.style.maxWidth = '';
        img.style.maxHeight = '';
        img.style.width = '';
        img.style.height = '';
        
        if (fitMode === 'width') {
            img.style.maxWidth = '100%';
            img.style.maxHeight = '100vh';
            img.style.width = 'auto';
            img.style.height = 'auto';
        } else if (fitMode === 'height') {
            img.style.maxHeight = 'calc(100vh - 80px)';  /* adjusted for current toolbar + progress */
            img.style.maxWidth = '100%';
            img.style.height = 'auto';
            img.style.width = 'auto';
        } else {
            // original
            img.style.maxWidth = 'none';
            img.style.maxHeight = 'none';
        }
    });
}

function setFitMode(mode) {
    fitMode = mode;
    document.querySelectorAll('.fit-btn').forEach(b => b.classList.remove('active'));
    
    if (mode === 'width') document.getElementById('fit-width').classList.add('active');
    else if (mode === 'height') document.getElementById('fit-height').classList.add('active');
    else document.getElementById('fit-original').classList.add('active');
    
    const wrapper = document.getElementById('image-wrapper');
    // reset zoom + pan when changing fit mode
    zoomLevel = 1;
    panX = 0; panY = 0;
    wrapper.style.transform = `scale(1) translate(0,0)`;
    
    updateFocusOnZoom();
    updateNavigationZones();
    applyFit();
}

function goToPage(page, animate = true) {
    if (scrollMode) {
        // auto exit scroll mode on explicit page nav (keys/arrows)
        scrollMode = false;
        const sbtn = document.getElementById('scroll-btn');
        const slabel = document.getElementById('scroll-label');
        const sw = document.getElementById('image-wrapper');
        const sc = document.getElementById('scroll-view');
        if (sbtn) sbtn.classList.remove('!bg-[#e11d48]', 'text-white');
        if (slabel) slabel.textContent = 'Скролл';
        if (sc) sc.style.display = 'none';
        if (sw) sw.style.display = '';
    }
    if (page < 1) page = 1;
    if (page > TOTAL_PAGES) {
        // Reached / turned past last page → mark completed then return to manga page
        const finalPage = TOTAL_PAGES;
        if (window.CURRENT_USER_ID && TOTAL_PAGES > 0) {
            fetch('/api/progress', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    manga_id: {{ manga.id if manga.id is defined else 0 }},
                    last_page: finalPage,
                    total: TOTAL_PAGES
                })
            }).catch(() => {});
        }
        if (history.length > 1) { history.back(); } else { window.location.href = '/manga/{{ manga.id }}'; }
        return;
    }
    if (page === currentPage && animate) return;
    
    currentPage = page;

    // update address bar to /manga/id/page without reload
    if (MANGA_ID) {
        const newUrl = `/manga/${MANGA_ID}/${page}`;
        history.replaceState({page: page}, '', newUrl);
    }

    // Preload the exact pages we will show, right now, before render
    const idx = currentPage - 1;
    if (isDouble) {
        let l = idx;
        let r = idx + 1;
        if (r >= pages.length) r = l;
        preloadPages(l, l);
        preloadPages(r, r);
        preloadPages(l, l + 8);
        preloadPages(r, r + 8);
    } else {
        preloadPages(idx, idx);
        preloadPages(idx, idx + 10);
    }

    renderCurrentImage();

    // Preload several pages ahead for future flips
    setTimeout(preloadAdjacent, 30);

    // Track progress for logged in users
    if (window.CURRENT_USER_ID && TOTAL_PAGES > 0) {
        fetch('/api/progress', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                manga_id: {{ manga.id if manga.id is defined else 0 }},
                last_page: currentPage,
                total: TOTAL_PAGES
            })
        }).catch(() => {});
    }
}

function nextPage() {
    let next = currentPage + (isDouble ? 2 : 1);
    // If beyond last -> goToPage will redirect to manga detail
    const idx = next - 1;
    if (idx < pages.length) {
        preloadPages(idx, idx);
        if (isDouble && idx + 1 < pages.length) {
            preloadPages(idx + 1, idx + 1);
        }
    }
    goToPage(next);
}

function prevPage() {
    let prev = currentPage - (isDouble ? 2 : 1);
    if (prev < 1) prev = 1;
    const idx = prev - 1;
    preloadPages(idx, idx);
    goToPage(prev);
}

function toggleDoublePage() {
    isDouble = !isDouble;
    // adjust current page if needed
    if (isDouble && currentPage % 2 === 0) currentPage -= 1;

    // Preload the (possibly new) page(s) that will be shown
    const idx = currentPage - 1;
    preloadPages(idx, idx);
    if (isDouble) {
        const r = Math.min(idx + 1, pages.length - 1);
        preloadPages(r, r);
    }
    renderCurrentImage();
    setTimeout(preloadAdjacent, 50);
}

function toggleDirection() {
    direction = (direction === 'ltr') ? 'rtl' : 'ltr';
    renderCurrentImage();
}

// SCROLL MODE (vertical continuous pages) - works on PC + mobile
function toggleScrollMode() {
    scrollMode = !scrollMode;
    const btn = document.getElementById('scroll-btn');
    const label = document.getElementById('scroll-label');
    const wrapper = document.getElementById('image-wrapper');
    const viewer = document.getElementById('viewer');

    if (scrollMode) {
        if (btn) btn.classList.add('!bg-[#e11d48]', 'text-white');
        if (label) label.textContent = 'Пейдж';
        window._scrollRestorePage = currentPage;

        // ensure top bar stays visible in scroll mode (mobile fix)
        const toolbarEl = document.querySelector('.reader-toolbar');
        if (toolbarEl) toolbarEl.style.display = '';

        if (wrapper) wrapper.style.display = 'none';
        if (!scrollContainer) {
            scrollContainer = document.createElement('div');
            scrollContainer.id = 'scroll-view';
            scrollContainer.style.cssText = 'width:100%; height:100%; overflow-y:auto; overflow-x:hidden; display:flex; flex-direction:column; align-items:center; gap:8px; padding:4px 0; background:#000;';
            viewer.appendChild(scrollContainer);
        }
        scrollContainer.innerHTML = '';
        scrollContainer.style.display = 'flex';

        // Economical scroll mode: use data-src + IntersectionObserver to load only near-viewport images
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                        delete img.dataset.src;
                    }
                    observer.unobserve(img);
                }
            });
        }, { root: scrollContainer, rootMargin: '200px 0px', threshold: 0.01 });

        pages.forEach((url, i) => {
            const img = document.createElement('img');
            img.style.cssText = 'max-width:100%; width:auto; height:auto; max-height:none; object-fit:contain; border:1px solid #222; border-radius:2px;';
            img.dataset.page = (i + 1);
            if (i < 3) {
                img.src = url; // eager for first few
            } else {
                img.dataset.src = url;
                img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; // placeholder 1x1
            }
            img.onerror = function(){ this.src='https://picsum.photos/id/1011/600/800'; };
            scrollContainer.appendChild(img);
            if (i >= 3) observer.observe(img);
        });

        setTimeout(() => {
            const imgs = scrollContainer.querySelectorAll('img');
            const target = imgs[(window._scrollRestorePage || 1) - 1];
            if (target) target.scrollIntoView({ block: 'start', behavior: 'auto' });
            updateScrollCurrent();
        }, 60);

        scrollContainer.onscroll = updateScrollCurrent;
        updateUI();
        updateNavigationZones();
    } else {
        if (btn) btn.classList.remove('!bg-[#e11d48]', 'text-white');
        if (label) label.textContent = 'Скролл';
        if (scrollContainer) scrollContainer.style.display = 'none';
        if (wrapper) wrapper.style.display = '';
        const restore = window._scrollRestorePage || currentPage;
        goToPage(restore, false);
        updateNavigationZones();
    }
}

function updateScrollCurrent() {
    if (!scrollMode || !scrollContainer) return;
    const imgs = Array.from(scrollContainer.querySelectorAll('img'));
    if (!imgs.length) return;
    const rect = scrollContainer.getBoundingClientRect();
    let best = 1;
    let bestVis = -1;
    imgs.forEach((img, idx) => {
        const r = img.getBoundingClientRect();
        const visibleTop = Math.max(r.top, rect.top);
        const visibleBottom = Math.min(r.bottom, rect.bottom);
        const vis = Math.max(0, visibleBottom - visibleTop);
        if (vis > bestVis) { bestVis = vis; best = idx + 1; }
    });
    if (best !== currentPage) {
        currentPage = best;
        if (MANGA_ID) {
            const newUrl = `/manga/${MANGA_ID}/${currentPage}`;
            history.replaceState({page: currentPage}, '', newUrl);
        }
        updateUI();
        if (window.CURRENT_USER_ID && TOTAL_PAGES > 0) {
            fetch('/api/progress', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ manga_id: {{ manga.id if manga.id is defined else 0 }}, last_page: currentPage, total: TOTAL_PAGES })
            }).catch(() => {});
        }
    }
}

// ZOOM + PAN
function updateZoomDisplay() {
    document.getElementById('zoom-level').innerText = Math.round(zoomLevel * 100) + '%';
}

function updateFocusOnZoom() {
  const shouldFocus = zoomLevel > 1.05;
  if (shouldFocus !== isFocused) {
    isFocused = shouldFocus;
    const root = document.documentElement;
    const bottomBar = document.getElementById('reader-bottom');
    if (isFocused) {
      root.classList.add('reader-focused');
      document.body.style.overflow = 'hidden';
      if (bottomBar) bottomBar.classList.add('hidden');
    } else {
      root.classList.remove('reader-focused');
      document.body.style.overflow = '';
      // On desktop, let auto-hide logic decide; don't force show here
    }
    updateNavigationZones();
  }
}

function getDistance(t1, t2) {
  const dx = t1.clientX - t2.clientX;
  const dy = t1.clientY - t2.clientY;
  return Math.hypot(dx, dy);
}



function updateNavigationZones() {
    const navs = document.querySelectorAll('.page-nav');
    const allowClicks = zoomLevel <= 1.05 && !isFocused && !scrollMode;
    navs.forEach(nav => {
        nav.style.pointerEvents = allowClicks ? 'auto' : 'none';
    });

    // Toggle class for CSS touch-action control
    const containerEl = document.getElementById('viewer');
    if (containerEl) {
        containerEl.classList.toggle('zoomed', zoomLevel > 1.05);
    }
}

function toggleReaderSettings() {
    const p = document.getElementById('reader-settings');
    if (!p) return;
    const gear = document.getElementById('gear-btn');
    if (p.classList.contains('hidden') || p.style.display === 'none' || !p.style.display) {
        p.classList.remove('hidden');
        p.style.display = 'block';
        // sync
        const dirEl = document.getElementById('dir-label');
        const d = document.getElementById('set-dir'); if (d && dirEl) d.textContent = dirEl.textContent || 'LTR';
        const dblEl = document.getElementById('double-label');
        const db = document.getElementById('set-double'); if (db && dblEl) db.textContent = dblEl.textContent || '1 стр.';
        const sc = document.getElementById('set-scroll'); if (sc) sc.textContent = scrollMode ? 'Пейдж' : 'Скролл';
    } else {
        hideReaderSettings();
    }
}
function hideReaderSettings() {
    const p = document.getElementById('reader-settings');
    if (p) {
        p.classList.add('hidden');
        p.style.display = '';
    }
}
// close settings on outside tap/click
document.addEventListener('click', function(ev) {
    const p = document.getElementById('reader-settings');
    const gear = document.getElementById('gear-btn');
    if (!p || !gear) return;
    if (p.style.display === 'block' && !p.contains(ev.target) && ev.target !== gear && !gear.contains(ev.target)) {
        p.classList.add('hidden');
        p.style.display = '';
    }
});

function zoomIn(delta = 0.15) {
    const wrapper = document.getElementById('image-wrapper');
    zoomLevel = Math.min(zoomLevel + delta, 4.5);
    wrapper.style.transitionDuration = '60ms';
    wrapper.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
    updateZoomDisplay();
    updateFocusOnZoom();
    updateNavigationZones();
}

function zoomOut(delta = 0.15) {
    const wrapper = document.getElementById('image-wrapper');
    zoomLevel = Math.max(zoomLevel - delta, 0.5);
    wrapper.style.transitionDuration = '60ms';
    wrapper.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
    updateZoomDisplay();
    updateFocusOnZoom();
    updateNavigationZones();
}

function resetZoom() {
    const wrapper = document.getElementById('image-wrapper');
    zoomLevel = 1;
    panX = 0;
    panY = 0;
    wrapper.style.transitionDuration = '120ms';
    wrapper.style.transform = `scale(1) translate(0, 0)`;
    updateZoomDisplay();
    updateFocusOnZoom();
    updateNavigationZones();
}

function setupZoomPan() {
    const container = document.getElementById('viewer');
    const wrapper = document.getElementById('image-wrapper');
    
    // Wheel zoom - only in paged mode; in scroll mode let native wheel scroll the pages
    container.addEventListener('wheel', function(e) {
        if (scrollMode) {
            return;  // allow default scroll in vertical mode
        }
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        const newZoom = Math.max(0.5, Math.min(4.5, zoomLevel + delta));
        
        // Zoom toward the cursor point. Center-relative works reliably on desktop for the centered viewer.
        const rect = container.getBoundingClientRect();
        const mouseX = e.clientX - rect.left - rect.width / 2;
        const mouseY = e.clientY - rect.top - rect.height / 2;

        const scaleFactor = newZoom / zoomLevel;
        panX = (panX - mouseX) * scaleFactor + mouseX;
        panY = (panY - mouseY) * scaleFactor + mouseY;
        
        zoomLevel = newZoom;
        wrapper.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
        updateZoomDisplay();
        updateFocusOnZoom();
        updateNavigationZones();
    }, { passive: false });

    // Drag to pan - attach to viewer container so it works even when image is panned to edges
    const viewerEl = document.getElementById('viewer');
    viewerEl.addEventListener('mousedown', function(e) {
        if (zoomLevel <= 1.05) return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        startPanX = panX;
        startPanY = panY;
        wrapper.style.transitionDuration = '0ms';
        e.preventDefault();
    });

    // Prevent browser default touch behaviors (scroll, pinch zoom) that cause jerking
    // especially on mobile when zoomed or in focus mode
    container.addEventListener('touchmove', (e) => {
        if (zoomLevel > 1.05 || isFocused) {
            e.preventDefault();
        }
    }, { passive: false });

    // Pinch-to-zoom for mobile
    const imageWrapper = document.getElementById('image-wrapper');
    imageWrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            pinchInitialDist = getDistance(e.touches[0], e.touches[1]);
            pinchInitialZoom = zoomLevel;
            const rect = container.getBoundingClientRect();
            // absolute point in container for accurate mobile zoom-to-touch
            pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
            pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
        } else if (e.touches.length === 1) {
            lastSingleTouchX = e.touches[0].clientX;
            lastSingleTouchY = e.touches[0].clientY;
        }
    }, {passive: true});

    imageWrapper.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dist = getDistance(e.touches[0], e.touches[1]);
            let newZoom = pinchInitialZoom * (dist / pinchInitialDist);
            newZoom = Math.max(0.5, Math.min(4.5, newZoom));

            const factor = newZoom / zoomLevel;
            // use absolute from container top-left for correct zoom-to-finger on mobile
            panX = (panX - pinchCenterX) * factor + pinchCenterX;
            panY = (panY - pinchCenterY) * factor + pinchCenterY;

            zoomLevel = newZoom;
            wrapper.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
            updateZoomDisplay();
            updateFocusOnZoom();
            updateNavigationZones();
        } else if (e.touches.length === 1 && zoomLevel > 1.05) {
            // Single finger pan after zoom on mobile
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - lastSingleTouchX;
            const dy = touch.clientY - lastSingleTouchY;
            // divide by zoomLevel for accurate 1:1 tracking when zoomed
            panX += dx / zoomLevel;
            panY += dy / zoomLevel;
            wrapper.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
            lastSingleTouchX = touch.clientX;
            lastSingleTouchY = touch.clientY;
        }
    }, {passive: false});

    // Mobile: tap on image to toggle bottom thumbnails (only after tap)
    if (isTouchDevice) {
        let tapX = 0, tapY = 0, moved = false;
        imageWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                tapX = e.touches[0].clientX;
                tapY = e.touches[0].clientY;
                moved = false;
            }
        }, {passive: true});

        imageWrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                const dx = Math.abs(e.touches[0].clientX - tapX);
                const dy = Math.abs(e.touches[0].clientY - tapY);
                if (dx > 10 || dy > 10) moved = true;
            }
        }, {passive: true});

        imageWrapper.addEventListener('touchend', (e) => {
            if (!moved) {
                const bottom = document.getElementById('reader-bottom');
                if (bottom) {
                    bottomVisible = !bottomVisible;
                    if (bottomVisible) bottom.classList.remove('hidden'); else bottom.classList.add('hidden');
                }
            }
        });
    }

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        // divide by zoom so drag distance matches finger/cursor 1:1 even when zoomed
        panX = startPanX + dx / zoomLevel;
        panY = startPanY + dy / zoomLevel;
        wrapper.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
    });

    document.addEventListener('mouseup', function() {
        isDragging = false;
        wrapper.style.transitionDuration = '80ms';
    });

    // Focus mode now auto-enters when zooming in (zoomLevel > 1.05).
    // It stays on during swipes/pinch.
    // Exit with double tap or by zooming back to original size.

    // Attach nav clicks with zoom check (in addition to pointer-events)
    const leftNav = document.querySelector('.page-nav.left');
    const rightNav = document.querySelector('.page-nav.right');
    if (leftNav) {
        leftNav.addEventListener('click', (e) => {
            if (zoomLevel > 1.05 || isFocused) {
                e.stopImmediatePropagation();
                return;
            }
            prevPage();
        });
    }
    if (rightNav) {
        rightNav.addEventListener('click', (e) => {
            if (zoomLevel > 1.05 || isFocused) {
                e.stopImmediatePropagation();
                return;
            }
            nextPage();
        });
    }

    // (duplicate tap listener removed - was attached twice on touch devices)
}

function setupKeyboard() {
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === ' ') {
            e.preventDefault();
            nextPage();
        }
        if (e.key === 'ArrowLeft' || e.key === 'a') {
            e.preventDefault();
            prevPage();
        }
        if (e.key.toLowerCase() === 'f') {
            // Quick toggle between width/height (default is now height)
            setFitMode(fitMode === 'height' ? 'width' : 'height');
        }
        if (e.key === 'Escape') {
            window.location.href = `/manga/${MANGA_ID || MANGA_SLUG}`;
        }
        if (e.key === '+' || e.key === '=') zoomIn(0.2);
        if (e.key === '-') zoomOut(0.2);
        if (e.key.toLowerCase() === 'r') resetZoom();
        if (e.key.toLowerCase() === '2') toggleDoublePage();
        if (e.key === '?') toggleDirection();
        
        // number keys jump
        if (/^[0-9]$/.test(e.key)) {
            const target = parseInt(e.key);
            if (target >= 1 && target <= 9) {
                const p = Math.floor((TOTAL_PAGES - 1) * (target / 9)) + 1;
                goToPage(p);
            }
        }
    });
    
    // Double tap on image:
    // - If in focus mode (zoomed), exit focus mode
    // - Otherwise, cycle fit modes
    const wrapper = document.getElementById('image-wrapper');
    wrapper.addEventListener('dblclick', () => {
        if (isFocused) {
            isFocused = false;
            document.documentElement.classList.remove('reader-focused');
            const bottomBar = document.getElementById('reader-bottom');
            const thumbs = document.getElementById('thumbnails');
            if (bottomBar) bottomBar.classList.remove('hidden');
            if (thumbs) thumbs.style.display = 'flex';
            document.body.style.overflow = '';
            bottomVisible = true;
            // On desktop, briefly show thumbnails strip then let auto-hide (1.5s) kick in
            if (!isTouchDevice) {
              if (hideBottomTimeout) clearTimeout(hideBottomTimeout);
              hideBottomTimeout = setTimeout(() => {
                if (!isFocused) {
                  if (thumbs) thumbs.style.display = 'none';
                  bottomVisible = false;
                }
              }, BOTTOM_HIDE_DELAY);
            }
            updateFocusOnZoom();
            updateNavigationZones();
        } else {
            const modes = ['height', 'width', 'original'];
            let i = modes.indexOf(fitMode);
            setFitMode(modes[(i + 1) % modes.length]);
        }
    });

    // Ensure nav zones state is correct after everything
    updateNavigationZones();
}

function preloadPages(startIdx, endIdx) {
    // 0-based indices - preload several pages ahead to avoid black flash on fast paging
    for (let i = startIdx; i <= endIdx; i++) {
        if (i < 0 || i >= pages.length) continue;
        const url = getPageUrl(i);
        if (!url) continue;
        // Use a cache of preloaded images to avoid re-creating
        if (!window._preloaded || !window._preloaded[url]) {
            const img = new Image();
            img.src = url;
            window._preloaded = window._preloaded || {};
            window._preloaded[url] = img;
        }
    }
}

function preloadAdjacent() {
    // Very aggressive preload for seamless flipping (no flicker, nhentai style)
    const ahead = isDouble ? 12 : 10;
    const behind = 5;

    const idx = currentPage - 1;  // 0-based

    preloadPages(idx, idx + ahead);
    preloadPages(Math.max(0, idx - behind), idx);
    if (isDouble) {
        preloadPages(idx + 1, idx + 1 + ahead);
    }
}

function initReader() {
    window.CURRENT_USER_ID = {% if current_user %}{{ current_user.id }}{% else %}null{% endif %};
    isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    loadMangaData().then(() => {
        // Default fit height (user preference)
        setFitMode('height');
        
        // Aggressive initial preload forward + adjacent for seamless
        setTimeout(() => {
            preloadPages(0, Math.min(8, pages.length - 1));
            preloadAdjacent();
            // Also preload around current if jumped
            const startIdx = (parseInt(new URLSearchParams(window.location.search).get('page')) || 1) - 1;
            preloadPages(Math.max(0, startIdx - 2), startIdx + 5);
        }, 50);
        
        if (isTouchDevice) {
            // Toolbar now ALWAYS visible on mobile too (back + controls like PC)
            // Bottom hidden by default on mobile, shown only after tap
            const bottomBar = document.getElementById('reader-bottom');
            if (bottomBar) bottomBar.classList.add('hidden');

            // Fit page to screen, prevent vertical scroll (toolbar takes space)
            const container = document.getElementById('viewer');
            if (container) {
                container.style.height = 'calc(100vh - 44px)';
            }
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
        } else {
            // Desktop: auto-hide the thumbnails strip (лента страниц) after mouse inactivity.
            // The thin progress line stays. Reappears on mouse movement.
            // Does not affect mobile tap behavior.
            const thumbnailsStrip = document.getElementById('thumbnails');
            const bottomBar = document.getElementById('reader-bottom');

            function showThumbnails() {
              if (thumbnailsStrip && !isFocused) {
                thumbnailsStrip.style.display = 'flex';
              }
              if (bottomBar && !isFocused) {
                bottomBar.classList.remove('hidden');
              }
              if (hideBottomTimeout) {
                clearTimeout(hideBottomTimeout);
                hideBottomTimeout = null;
              }
              bottomVisible = true;
            }

            function scheduleHideThumbnails() {
              if (hideBottomTimeout) clearTimeout(hideBottomTimeout);
              if (isFocused || !thumbnailsStrip) return;
              hideBottomTimeout = setTimeout(() => {
                if (!isFocused) {
                  thumbnailsStrip.style.display = 'none';
                  bottomVisible = false;
                }
              }, BOTTOM_HIDE_DELAY);
            }

            // Start hidden (only thin progress line visible at bottom). 
            // The thumbnails strip appears only on mouse move and auto-hides.
            if (thumbnailsStrip) thumbnailsStrip.style.display = 'none';
            // No forced show on load or page changes.

            // Show thumbnails on mouse move (desktop)
            document.addEventListener('mousemove', () => {
              if (isFocused) return;
              showThumbnails();
              scheduleHideThumbnails();
            });

            // Keep visible while hovering the whole bottom area
            if (bottomBar) {
              bottomBar.addEventListener('mouseenter', () => {
                if (hideBottomTimeout) {
                  clearTimeout(hideBottomTimeout);
                  hideBottomTimeout = null;
                }
              });
              bottomBar.addEventListener('mouseleave', () => {
                if (!isFocused) scheduleHideThumbnails();
              });
            }
        }
        
        setupZoomPan();
        setupKeyboard();
        
        updateNavigationZones();
        
        // Initial forward preload (already done above, but ensure)
        setTimeout(preloadAdjacent, 300);
        
        // Click hints
        const viewer = document.getElementById('viewer');
        viewer.title = "Клик слева / справа — листать • Колесо — зум • Двойной клик по картинке — смена режима";
    });
    
    // Bonus: Arrow keys always active
    window.addEventListener('focus', () => {});
}

// Boot
